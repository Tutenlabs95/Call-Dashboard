<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Center Rolling Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1420;
    --panel: #171d2b;
    --panel-border: #262f42;
    --text: #e7ebf3;
    --muted: #8f9bb3;
    --accent: #4d8dff;
    --green: #35c48f;
    --amber: #f2b84b;
    --red: #ef5a6f;
    --purple: #a375f0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .toolbar button {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--text);
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  .toolbar button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .toolbar .spacer { flex: 1; }
  .toolbar .meta { color: var(--muted); font-size: 12px; }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 16px 18px;
  }
  .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  .card .value { font-size: 28px; font-weight: 600; margin-top: 6px; }
  .card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .card.accent-blue .value { color: var(--accent); }
  .card.accent-green .value { color: var(--green); }
  .card.accent-amber .value { color: var(--amber); }
  .card.accent-red .value { color: var(--red); }
  .card.accent-purple .value { color: var(--purple); }
  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 20px;
  }
  .panel h2 { font-size: 15px; margin: 0 0 14px; color: var(--text); }
  .chart-wrap { position: relative; height: 320px; }
  .notes {
    background: #1c1a12;
    border: 1px solid #4a3f1f;
    color: #e6cf8f;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 12.5px;
    line-height: 1.5;
    margin-bottom: 20px;
  }
  .notes b { color: #ffdf9e; }
  footer { color: var(--muted); font-size: 11px; text-align: center; margin-top: 20px; }
  .loading { color: var(--muted); padding: 40px; text-align: center; }
</style>
</head>
<body>

<h1>Call Center Rolling Dashboard</h1>
<div class="subtitle">Answer speed, abandonment, CBSI transfers &amp; 5-minute SLA attainment &mdash; source: Metabase "Calls" table</div>

<div id="app"><div class="loading">Loading data.json&hellip;</div></div>

<footer id="footer"></footer>

<script>
const RANGE_OPTIONS = [
  { key: '30', label: 'Last 30 days' },
  { key: '90', label: 'Last 90 days' },
  { key: 'all', label: 'All time' }
];
let state = { range: '30', data: null };

function pct(n, d) { return d > 0 ? (100 * n / d) : 0; }
function fmtPct(n, d) { return d > 0 ? pct(n, d).toFixed(1) + '%' : '—'; }
function fmtInt(n) { return n.toLocaleString(); }

function filteredDays() {
  const days = state.data.days;
  if (state.range === 'all') return days;
  const n = parseInt(state.range, 10);
  return days.slice(-n);
}

function sumField(days, field) {
  return days.reduce((a, d) => a + d[field], 0);
}

function render() {
  const days = filteredDays();
  const totals = {
    total: sumField(days, 'total'),
    answered: sumField(days, 'answered'),
    answered30s: sumField(days, 'answered30s'),
    answered2min: sumField(days, 'answered2min'),
    abandoned: sumField(days, 'abandoned'),
    transferredCbsi: sumField(days, 'transferredCbsi'),
    slaHit5min: sumField(days, 'slaHit5min')
  };

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="toolbar" id="toolbar"></div>
    <div class="notes">
      <b>Data quality note:</b> ${state.data.dataQualityNote}<br><br>
      <b>Coverage note:</b> ${state.data.coverageNote}
    </div>
    <div class="cards">
      <div class="card accent-blue">
        <div class="label">Total Calls</div>
        <div class="value">${fmtInt(totals.total)}</div>
        <div class="sub">${days.length} day${days.length===1?'':'s'} in range</div>
      </div>
      <div class="card accent-green">
        <div class="label">Answered &le; 30s</div>
        <div class="value">${fmtInt(totals.answered30s)}</div>
        <div class="sub">${fmtPct(totals.answered30s, totals.answered)} of answered calls</div>
      </div>
      <div class="card accent-green">
        <div class="label">Answered &le; 2 min</div>
        <div class="value">${fmtInt(totals.answered2min)}</div>
        <div class="sub">${fmtPct(totals.answered2min, totals.answered)} of answered calls</div>
      </div>
      <div class="card accent-red">
        <div class="label">Abandoned</div>
        <div class="value">${fmtInt(totals.abandoned)}</div>
        <div class="sub">${fmtPct(totals.abandoned, totals.total)} of all calls</div>
      </div>
      <div class="card accent-purple">
        <div class="label">Transferred to CBSI</div>
        <div class="value">${fmtInt(totals.transferredCbsi)}</div>
        <div class="sub">${fmtPct(totals.transferredCbsi, totals.total)} of all calls</div>
      </div>
      <div class="card accent-amber">
        <div class="label">SLA % (resolved &le; 5 min)</div>
        <div class="value">${fmtPct(totals.slaHit5min, totals.total)}</div>
        <div class="sub">${fmtInt(totals.slaHit5min)} of ${fmtInt(totals.total)} calls</div>
      </div>
    </div>
    <div class="panel">
      <h2>Daily volume: answered (&le;30s / &le;2min), abandoned, CBSI transfers</h2>
      <div class="chart-wrap"><canvas id="volumeChart"></canvas></div>
    </div>
    <div class="panel">
      <h2>Daily SLA % attained (resolved within 5 minutes)</h2>
      <div class="chart-wrap"><canvas id="slaChart"></canvas></div>
    </div>
  `;

  const toolbar = document.getElementById('toolbar');
  RANGE_OPTIONS.forEach(opt => {
    const btn = document.createElement('button');
    btn.textContent = opt.label;
    if (opt.key === state.range) btn.classList.add('active');
    btn.onclick = () => { state.range = opt.key; render(); };
    toolbar.appendChild(btn);
  });
  const spacer = document.createElement('div');
  spacer.className = 'spacer';
  toolbar.appendChild(spacer);
  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.textContent = `Data through ${state.data.days[state.data.days.length-1].date} · generated ${new Date(state.data.generatedAt).toLocaleString()}`;
  toolbar.appendChild(meta);

  const labels = days.map(d => d.date);
  new Chart(document.getElementById('volumeChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Answered ≤30s', data: days.map(d=>d.answered30s), backgroundColor: '#35c48f' },
        { label: 'Answered ≤2min', data: days.map(d=>d.answered2min), backgroundColor: '#4d8dff' },
        { label: 'Abandoned', data: days.map(d=>d.abandoned), backgroundColor: '#ef5a6f' },
        { label: 'Transferred to CBSI', data: days.map(d=>d.transferredCbsi), backgroundColor: '#a375f0' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: { ticks: { color: '#8f9bb3', maxRotation: 60, minRotation: 0, autoSkip: true }, grid: { color: '#262f42' } },
        y: { ticks: { color: '#8f9bb3' }, grid: { color: '#262f42' }, beginAtZero: true }
      },
      plugins: { legend: { labels: { color: '#e7ebf3' } } }
    }
  });

  new Chart(document.getElementById('slaChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'SLA % (≤5 min)',
        data: days.map(d => pct(d.slaHit5min, d.total)),
        borderColor: '#f2b84b',
        backgroundColor: 'rgba(242,184,75,0.15)',
        fill: true,
        tension: 0.25,
        pointRadius: 0
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: { ticks: { color: '#8f9bb3', maxRotation: 60, autoSkip: true }, grid: { color: '#262f42' } },
        y: { ticks: { color: '#8f9bb3', callback: v => v + '%' }, grid: { color: '#262f42' }, beginAtZero: true, max: 100 }
      },
      plugins: { legend: { labels: { color: '#e7ebf3' } } }
    }
  });
}

fetch('data.json')
  .then(r => r.json())
  .then(data => {
    state.data = data;
    render();
    document.getElementById('footer').textContent =
      `Source: ${data.source}. Metric definitions available in data.json → metricDefinitions.`;
  })
  .catch(err => {
    document.getElementById('app').innerHTML =
      `<div class="loading">Couldn't load data.json (${err.message}). Make sure this file is served alongside index.html (e.g. via GitHub Pages, not opened directly as file://).</div>`;
  });
</script>
</body>
</html>
